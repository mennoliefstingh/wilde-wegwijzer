server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location ~* \.(css|js)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "public, max-age=300";
    try_files $uri /index.html;
  }
}
