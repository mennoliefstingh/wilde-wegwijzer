<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Wilde Wegwijzer Admin</title>
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css?v=1.9.4" />
    <link rel="stylesheet" href="styles.css?v=stateful-20260629" />
  </head>
  <body class="admin-body">
    <main class="admin-shell">
      <section id="loginPanel" class="admin-login">
        <h1>Wilde Wegwijzer Admin</h1>
        <form id="loginForm" class="admin-form">
          <label>
            <span>Wachtwoord</span>
            <input id="adminPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="ww-btn-solid" type="submit">Inloggen</button>
          <p id="loginStatus" class="admin-status"></p>
        </form>
      </section>

      <section id="adminWorkbench" class="admin-workbench" hidden>
        <aside class="admin-panel">
          <header class="admin-panel-header">
            <div>
              <p>Wilde</p>
              <h1>Admin</h1>
            </div>
            <button id="logoutBtn" class="ww-btn" type="button">Uitloggen</button>
          </header>

          <div class="admin-actions-row">
            <button id="newPointBtn" class="ww-btn-solid" type="button">Nieuwe POI</button>
            <button id="newAreaBtn" class="ww-btn" type="button">Nieuw gebied</button>
          </div>
          <p id="drawHint" class="admin-hint"></p>

          <form id="featureForm" class="admin-form">
            <input id="featureId" type="hidden" />
            <label>
              <span>Titel</span>
              <input id="featureTitle" type="text" maxlength="160" required />
            </label>
            <label>
              <span>Beschrijving</span>
              <textarea id="featureText" rows="3" maxlength="500"></textarea>
            </label>
            <div class="admin-grid">
              <label>
                <span>Type</span>
                <select id="featureType">
                  <option value="stage">Podium</option>
                  <option value="area">Gebied/POI</option>
                </select>
              </label>
              <label>
                <span>Filter</span>
                <select id="mapKind">
                  <option value="stage">Podia</option>
                  <option value="camping">Campings</option>
                  <option value="facility">Overig</option>
                  <option value="info">Info</option>
                  <option value="dim">Festivalterrein DIM</option>
                </select>
              </label>
              <label>
                <span>Weergave</span>
                <select id="displayKind">
                  <option value="point">Punt</option>
                  <option value="area">Gebied</option>
                </select>
              </label>
              <label>
                <span>Stijl</span>
                <select id="styleCategory">
                  <option value="stage">Podium</option>
                  <option value="side">Blauw/overig</option>
                  <option value="camping">Roze camping</option>
                  <option value="wildlive">Roze gebied</option>
                  <option value="dim">DIM</option>
                </select>
              </label>
            </div>
            <div class="admin-grid">
              <label>
                <span>X</span>
                <input id="pixelX" type="number" step="0.1" />
              </label>
              <label>
                <span>Y</span>
                <input id="pixelY" type="number" step="0.1" />
              </label>
            </div>
            <label>
              <span>Gebiedspunten JSON</span>
              <textarea id="pixelPoints" rows="4" spellcheck="false"></textarea>
            </label>
            <div class="admin-checks">
              <label><input id="isVisible" type="checkbox" checked /> Zichtbaar</label>
              <label><input id="isDim" type="checkbox" /> DIM</label>
            </div>
            <div class="admin-actions-row">
              <button class="ww-btn-solid" type="submit">Opslaan</button>
              <button id="deleteFeatureBtn" class="ww-btn" type="button">Verwijderen</button>
              <button id="finishAreaBtn" class="ww-btn" type="button" hidden>Gebied klaar</button>
            </div>
          </form>

          <h2>Kaartobjecten</h2>
          <div id="featureList" class="admin-list"></div>

          <h2>Publieke pins</h2>
          <div id="publicPinList" class="admin-list"></div>
        </aside>
        <section id="adminMap" class="admin-map" aria-label="Admin kaart"></section>
      </section>
    </main>

    <script src="vendor/leaflet/leaflet.js?v=1.9.4"></script>
    <script src="admin.js?v=admin-login-reload-20260630" type="module"></script>
  </body>
</html>
